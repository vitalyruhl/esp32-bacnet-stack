; Focused public import compile fixtures. No upload or monitor targets are defined.

[platformio]
src_dir = src

[env]
platform = espressif32
board = nodemcu-32s
framework = arduino
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	-I../../src

[env:client-only]
build_src_filter = +<client_only.cpp>

[env:server-only]
build_src_filter = +<server_only.cpp>

[env:combined]
build_src_filter = +<combined.cpp>

[env:legacy]
build_src_filter = +<legacy.cpp>
