; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = ESP32 C++17 BACnet/IP stack library with client and server support

[env:usb]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200

build_unflags =
	-std=gnu++11

build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17

build_src_filter =
	+<*>
	-<platform/windows/>

test_build_src = yes

[env:usb-readonly-gates]
extends = env:usb
build_flags =
	${env:usb.build_flags}
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=0
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=0

[env:usb-write-gates]
extends = env:usb
build_flags =
	${env:usb.build_flags}
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=1
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=1

[env:usb-write-priority-disabled-gates]
extends = env:usb
build_flags =
	${env:usb.build_flags}
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=1
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=0

[env:usb-invalid-priority-gate]
extends = env:usb
build_flags =
	${env:usb.build_flags}
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=0
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=1
