name: PlatformIO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck governance gate
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/run-cppcheck.ps1

      - name: Pack and validate PlatformIO package content
        run: |
          mkdir -p .Temp/package-ci
          pio pkg pack . -o .Temp/package-ci
          python tools/release/check-package-content.py .Temp/package-ci/ESP32BACnetStack-0.35.0.tar.gz --version 0.35.0

      - name: Build root project
        run: pio run -e usb

      - name: Build WiFi client demo
        run: pio run -d examples/client-demo-wifi -e usb

      - name: Build Ethernet client demo
        run: pio run -d examples/client-demo-ETH -e eth

      - name: Build basic client example
        run: pio run -d examples/client-object-list-scan-basic -e usb -e eth

      - name: Build WAGO HIL runner
        run: pio run -d examples/hil-wago-client-acceptance -e usb -e eth

      - name: Build server demo
        run: pio run -d examples/server-demo -e usb -e eth

      - name: Build BME280 server demo
        run: pio run -d examples/server-bme280-demo -e usb

      - name: Compile tests
        run: pio test -e usb --without-uploading --without-testing

  windows-native:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure native Windows build
        run: cmake -S tools/portable-smoke -B build/native-windows

      - name: Build native Windows targets
        run: cmake --build build/native-windows --config Debug

      - name: Run native Windows tests
        run: ctest --test-dir build/native-windows -C Debug --output-on-failure

      - name: Run discovery smoke CLI checks
        shell: pwsh
        run: |
          & .\build\native-windows\native\Debug\bacnet-discover.exe --help
          & .\build\native-windows\native\Debug\bacnet-client.exe --help
          & .\build\native-windows\native\Debug\bacnet-client.exe list --help
          & .\build\native-windows\native\Debug\bacnet-client.exe read --help
          & .\build\native-windows\native\Debug\bacnet-discover-smoke.exe --help
          & .\build\native-windows\native\Debug\bacnet-discover-smoke.exe --self-test
