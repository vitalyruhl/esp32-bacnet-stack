name: PlatformIO

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck governance gate
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/run-cppcheck.ps1

      - name: Build root project
        run: pio run -e usb

      - name: Build WiFi client demo
        run: pio run -d examples/client-demo-wifi -e usb

      - name: Build Ethernet client demo
        run: pio run -d examples/client-demo-ETH -e eth

      - name: Build basic client example
        run: pio run -d examples/client-object-list-scan-basic -e usb -e eth

      - name: Build WAGO HIL runner
        run: pio run -d examples/hil-wago-client-acceptance -e usb -e eth

      - name: Build server demo
        run: pio run -d examples/server-demo -e usb -e eth

      - name: Compile tests
        run: pio test -e usb --without-uploading --without-testing
