name: PlatformIO

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build root project
        run: pio run -e usb

      - name: Build client demo
        run: pio run -d examples/client-demo -e usb

      - name: Build server demo
        run: pio run -d examples/server-demo -e usb

      - name: Compile tests
        run: pio test -e usb --without-uploading --without-testing
