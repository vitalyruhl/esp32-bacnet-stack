; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = ESP32 BACnet/IP object-list scan basic example
; Keep build artifacts out of the library repository.
build_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-object-list-scan-basic
libdeps_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-object-list-scan-basic/libdeps

[env:usb]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200

build_unflags =
	-std=gnu++11

build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17

lib_deps =
	symlink://../..
