; PlatformIO configuration for the BACnet server role demo.

[platformio]
description = ESP32 BACnet/IP server demo
default_envs = usb
build_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/server-demo
libdeps_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/server-demo/libdeps

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	-I../common
lib_deps =
	symlink://../..

[env:usb]
board = nodemcu-32s

[env:eth]
board = wt32-eth01
upload_protocol = esptool
upload_speed = 115200
build_flags =
	${env.build_flags}
	-DEXAMPLE_USE_ETHERNET=1

; Local hardware convenience profile. COM6 is not assumed to be portable.
[env:eth-com6]
extends = env:eth
upload_port = COM6
monitor_port = COM6
