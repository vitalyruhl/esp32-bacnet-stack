; ESP32 WiFi BACnet server for the paired Ethernet live-COV demo.

[platformio]
description = ESP-to-ESP WiFi BACnet server live demo
default_envs = wifi-com7
build_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/server-esp-to-esp-demo-wifi
libdeps_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/server-esp-to-esp-demo-wifi/libdeps

[env]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	-DCM_ENABLE_SYSTEM_PROVIDER=0
	-DCM_ENABLE_LOGGING=0
	-DCM_ENABLE_VERBOSE_LOGGING=0
	-DCM_DISABLE_GUI_LOGGING
lib_deps =
	vitaly.ruhl/ESP32 Configuration Manager@4.4.1
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	symlink://../..

[env:wifi-com7]
board_build.partitions = no_ota.csv
upload_port = COM7
monitor_port = COM7
build_flags =
	${env.build_flags}
	-DCM_ENABLE_OTA=0
