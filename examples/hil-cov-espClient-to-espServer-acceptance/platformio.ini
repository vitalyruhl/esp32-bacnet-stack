; Local-only ESP32 Ethernet-to-WiFi BACnet COV acceptance HIL runner.

[platformio]
description = Local ESP32 BACnet COV acceptance HIL runner
default_envs = eth-cov

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	symlink://../..
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	-DARDUINO_LOOP_STACK_SIZE=16384
	-I../common

[env:eth-cov]
board = wt32-eth01
upload_protocol = esptool
upload_speed = 115200
build_flags =
	${env.build_flags}
	-I../common
	-DEXAMPLE_USE_ETHERNET=1

; Local COV acceptance profile. The target is the WiFi ESP on the local LAN;
; Ethernet credentials remain in the ignored local secrets file.
[env:eth-com6-cov-hil]
extends = env:eth-cov
upload_port = COM6
monitor_port = COM6
; The AZ-Delivery FTDI adapter uses the documented NPN DTR/RTS auto-reset circuit.
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset
build_flags =
	${env:eth-cov.build_flags}
	-DHIL_IO_SERVER_COV_MODE=1
	-DHIL_EXPECT_COV_SUPPORTED=true
	-DHIL_IO_SERVER_TARGET_IP=\"192.168.2.126\"
	-DHIL_IO_SERVER_TARGET_DEVICE_INSTANCE=1682127
