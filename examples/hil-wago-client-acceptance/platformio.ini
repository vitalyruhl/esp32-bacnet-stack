; Local-only WAGO BACnet/IP client acceptance HIL runner.

[platformio]
description = Local WAGO BACnet/IP client acceptance HIL runner
default_envs = usb

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	symlink://../..
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	-DARDUINO_LOOP_STACK_SIZE=16384

[env:usb]
board = nodemcu-32s

[env:eth]
board = wt32-eth01
upload_protocol = esptool
upload_speed = 115200
build_flags =
	${env.build_flags}
	-I../common
	-DEXAMPLE_USE_ETHERNET=1

; Local hardware convenience profile. COM6 is not assumed to be portable.
[env:eth-com6]
extends = env:eth
upload_port = COM6
monitor_port = COM6

; Explicit local-only Priority Write HIL profile. The local secrets gate remains
; disabled by default and must be enabled in the ignored secrets.h file.
[env:eth-com6-priority-hil]
extends = env:eth-com6
board_upload.before_reset = no_reset
board_upload.after_reset = no_reset
build_flags =
	${env:eth.build_flags}
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=1
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=1
