; PlatformIO configuration for the WT32-ETH01 V1.4 BACnet/IP client demo.

[platformio]
description = WT32-ETH01 V1.4 BACnet/IP Ethernet client demo
default_envs = eth
src_dir = ../common/client-demo/src
include_dir = ../common/client-demo/include
build_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-demo-ETH
libdeps_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-demo-ETH/libdeps

[env]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 115200
board_build.partitions = no_ota.csv
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	-Isrc
	-I../common
	-DBACNET_DEMO_USE_ETHERNET=1
	-DESP_BACNET_ENABLE_WRITE_PROPERTY=1
	-DESP_BACNET_ENABLE_PRIORITY_WRITE=1
	-DCM_ENABLE_WIFI=0
	-DCM_ENABLE_LOGGING=0
	-DCM_ENABLE_VERBOSE_LOGGING=0
	-DCM_ENABLE_OTA=0
	-DCM_DISABLE_GUI_LOGGING
	-DESP_BACNET_PROPERTY_CACHE_SIZE=24
	-DBACNET_LOG_MAX_OUTPUTS=1
lib_deps =
	; ConfigManager V4.4.0 (commit is pinned because no v4.4.0 tag exists yet).
	https://github.com/vitalyruhl/ConfigurationsManager.git#cf545d69dbe67ab590a616714117a139a8f80283
	bblanchon/ArduinoJson@~7.4.3
	esphome/ESPAsyncWebServer-esphome@~3.4.0
	esphome/AsyncTCP-esphome@2.1.4
	symlink://../..

[env:eth]

; Local hardware convenience profile. COM6 is not assumed to be portable.
[env:eth-com6]
extends = env:eth
upload_port = COM6
monitor_port = COM6
