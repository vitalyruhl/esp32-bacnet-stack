; WT32-ETH01 BACnet client for the paired WiFi live-COV demo.

[platformio]
description = ESP-to-ESP Ethernet BACnet client live demo
default_envs = eth-com6
build_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-esp-to-esp-demo-eth
libdeps_dir = ${sysenv.HOME}/.pio/esp32-bacnet-stack/examples/client-esp-to-esp-demo-eth/libdeps
include_dir = ../common/client-demo/include

[env]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 115200
board_build.partitions = no_ota.csv
extra_scripts = pre:scripts/generate_client_base.py
build_unflags =
	-std=gnu++11
build_flags =
	-Wno-deprecated-declarations
	-std=gnu++17
	; The paired live COV browser owns several concurrent subscription jobs.
	; Keep their bounded protocol frames out of the Arduino loopTask stack.
	-DARDUINO_LOOP_STACK_SIZE=16384
	-Isrc
	-I../common
	-I../common/client-demo/src
	-DBACNET_DEMO_USE_ETHERNET=1
	-DBACNET_TARGET_ADDRESS=\"192.168.2.126\"
	-DBACNET_TARGET_DEVICE_INSTANCE=1682127
	-DBACNET_DEMO_ENABLE_WATCHED_VALUES=0
	-DBACNET_DEMO_ENABLE_OBJECT_COV=1
	-DBACNET_DEMO_ENABLE_RUNTIME_GUI=0
	-DBACNET_DEMO_MAX_FOUND_OBJECTS_TO_DISPLAY=5
	-DBACNET_DEMO_DEFAULT_COV_LIFETIME_SECONDS=30
	-DBACNET_DEMO_OBJECT_COV_LIFETIME_SECONDS=30
	-DCM_ENABLE_WIFI=0
	-DCM_ENABLE_SYSTEM_PROVIDER=0
	-DCM_ENABLE_LOGGING=0
	-DCM_ENABLE_VERBOSE_LOGGING=0
	-DCM_ENABLE_OTA=0
	-DCM_DISABLE_GUI_LOGGING
	-DESP_BACNET_PROPERTY_CACHE_SIZE=24
	-DBACNET_LOG_MAX_OUTPUTS=1
lib_deps =
	https://github.com/vitalyruhl/ConfigurationsManager.git#cf545d69dbe67ab590a616714117a139a8f80283
	bblanchon/ArduinoJson@~7.4.3
	esphome/ESPAsyncWebServer-esphome@~3.4.0
	esphome/AsyncTCP-esphome@2.1.4
	symlink://../..

[env:eth-com6]
upload_port = COM6
monitor_port = COM6
board_upload.before_reset = default_reset
board_upload.after_reset = hard_reset

[env:eth-com6-quiet]
extends = env:eth-com6
build_flags =
	${env:eth-com6.build_flags}
	-DBACNET_ENABLE_LOGGING=0
	-DCLIENT_DEMO_ENABLE_LOGGING=0
	-DBACNET_DEMO_ENABLE_SERIAL_DIAGNOSTICS=0
